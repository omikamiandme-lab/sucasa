<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>3D Property Viewer</title>
    <style>
      * { margin: 0; padding: 0; box-sizing: border-box; }
      html, body { width: 100%; height: 100%; overflow: hidden; background: #111; }
      #app { width: 100%; height: 100%; position: relative; }
      #ui-overlay {
        position: absolute;
        top: 16px;
        left: 50%;
        transform: translateX(-50%);
        display: flex;
        gap: 8px;
        z-index: 10;
        background: rgba(0,0,0,0.6);
        padding: 10px 16px;
        border-radius: 8px;
        align-items: center;
      }
      #ui-overlay input {
        padding: 6px 12px;
        border: 1px solid #555;
        border-radius: 4px;
        background: #222;
        color: #eee;
        font-size: 14px;
        width: 320px;
        outline: none;
      }
      #ui-overlay input:focus { border-color: #4a9eff; }
      #ui-overlay button {
        padding: 6px 14px;
        border: none;
        border-radius: 4px;
        background: #4a9eff;
        color: #fff;
        font-size: 14px;
        cursor: pointer;
        white-space: nowrap;
      }
      #ui-overlay button:hover { background: #3680d6; }
      #ui-overlay button#reset-btn { background: #555; }
      #ui-overlay button#reset-btn:hover { background: #777; }
      #status {
        position: absolute;
        bottom: 16px;
        left: 50%;
        transform: translateX(-50%);
        color: #aaa;
        font-size: 13px;
        font-family: sans-serif;
        z-index: 10;
        background: rgba(0,0,0,0.5);
        padding: 4px 12px;
        border-radius: 4px;
      }
    </style>
  </head>
  <body>
    <div id="app"></div>
    <div id="ui-overlay">
      <input id="url-input" type="text" placeholder="Paste a .glb/.gltf URL here..." />
      <button id="load-btn">Load</button>
      <button id="reset-btn">Reset Camera</button>
    </div>
    <div id="status">Loading demo model...</div>
    <script type="module" src="/src/main.ts"></script>
  </body>
</html>
